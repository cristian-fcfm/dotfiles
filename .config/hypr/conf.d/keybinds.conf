###################
### KEYBINDINGS ###
###################

# set the superkey for keybindings
$mainMod = SUPER

# workspace binding (handled dynamically by monitor-setup.sh)
# workspace=1, monitor:HDMI-A-1
# workspace=2, monitor:DP-1
# workspace=3, monitor:HDMI-A-1
# workspace=4, monitor:HDMI-A-1
# workspace=5, monitor:HDMI-A-1
# workspace=6, monitor:HDMI-A-1
# workspace=7, monitor:DP-1
# workspace=8, monitor:DP-1
# workspace=9, monitor:DP-1
# workspace=10, monitor:DP-1

# ─── Core Actions ────────────────────────────────────────────────────────────
bind = $mainMod, return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, B, pseudo, # dwindle
# Toggle split orientation (dwindle). Moved from ALT+J (conflicts with HRM ring finger = Alt)
bind = $mainMod, T, togglesplit, # dwindle

# ─── Monitor Configuration ──────────────────────────────────────────────────
bind = $mainMod ALT, M, exec, ~/.config/hypr/scripts/monitor-dual.sh  # dual monitor
bind = $mainMod ALT, H, exec, ~/.config/hypr/scripts/monitor-hdmi.sh  # solo HDMI
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/monitor-dp.sh    # solo DP-1

# ─── Focus Navigation (vim-style) ───────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# ─── Move Windows in Workspaces ─────────────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# ─── Switch Workspaces ──────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ─── Move Window to Workspace (follow) ──────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Move Window to Workspace (silent, no follow) ───────────────────────────
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# ─── Special Workspace (Scratchpad) ─────────────────────────────────────────
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad

# ─── Workspace Scroll and Cycle ─────────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = CONTROL_ALT, right, workspace, m+1
bind = CONTROL_ALT, left, workspace, m-1

# ─── Mouse: Move/Resize ─────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Screenshots ─────────────────────────────────────────────────────────────
bind = $mainMod, Print, exec, ~/.scripts/screenshot_monitor.sh
bind = $mainMod SHIFT, Print, exec, ~/.scripts/screenshot_area.sh
bind = , Print, exec, ~/.scripts/screenshot_monitor.sh

# ─── Media / Hardware Keys ──────────────────────────────────────────────────
binde=,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde=,XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind =,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind =,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binde=,XF86MonBrightnessUp,   exec, brightnessctl s 10%+
binde=,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind =,XF86AudioPlay,         exec, playerctl play-pause
bind =,XF86AudioPrev,         exec, playerctl previous
bind =,XF86AudioNext,         exec, playerctl next

# ─── Resize Submap ──────────────────────────────────────────────────────────
# Enter resize mode: press Super+R, then use HJKL to resize, Escape/Enter to exit
bind=SUPER,R,submap,resize
submap=resize
binde=,L,resizeactive,40 0
binde=,H,resizeactive,-40 0
binde=,K,resizeactive,0 -40
binde=,J,resizeactive,0 40
bind=,escape,submap,reset
bind=,Return,submap,reset
submap=reset

# Quick resize without entering submap (Super+Ctrl+HJKL, repeatable)
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive, 40 0
binde = $mainMod CTRL, K, resizeactive, 0 -40
binde = $mainMod CTRL, J, resizeactive, 0 40

