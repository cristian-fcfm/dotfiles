[mgr]
ratio          = [ 1, 4, 3 ]
sort_dir_first = true
linemode       = "size"
show_hidden    = true

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Neovim", block = true },
]
reveal = [
  { run = 'xdg-open "$(dirname "$0")"', desc = "Reveal in file manager", for = "linux" },
  { run = 'open -R "$0"',               desc = "Reveal in Finder",       for = "macos" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
  { run = 'open "$@"',     desc = "Open", for = "macos" },
]
text = [
  { run = 'nvim "$@"', desc = "Neovim", block = true },
]
image = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
  { run = 'open "$@"',     desc = "Open", for = "macos" },
]
video = [
  { run = 'mpv "$@"', desc = "mpv" },
]
pdf = [
  { run = 'bookokrat "$@"', desc = "Bookokrat" },
]
archive = [
  { run = 'ouch decompress --yes "$@"', desc = "Extract archive (ouch)", block = true },
]

[open]
rules = [
  # Archivos de texto y código
  { url = "*.{md,py,sql,jinja,jinja2,j2,sh,bash,lua,toml,yaml,yml,json,conf,txt,vim}", use = ["text", "reveal"] },

  # Multimedia
  { mime = "image/*", use = ["image", "reveal"] },
  { mime = "video/*", use = ["video", "reveal"] },

  # PDFs y eBooks
  { url = "*.{pdf,epub}", use = ["pdf", "reveal"] },

  # Archivos comprimidos
  { url = "*.{tar.gz,tar.xz,zip,7z,rar}", use = ["archive", "reveal"] },

  # Por defecto
  { url = "*", use = ["open", "reveal"] },
]

[log]
enabled = false

[input]
cursor_blink = false

[select]
open_offset = "auto"

