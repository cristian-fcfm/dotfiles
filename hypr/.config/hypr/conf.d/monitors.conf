################
### MONITORS ###
################

# DP-1 siempre en 0x0; HDMI-A-1 a la derecha (deshabilitado por defecto).
# El toggle (monitor-toggle.sh) sólo lo enciende/apaga sin mover posiciones.
monitor=DP-1,2560x1440@165,0x0,1
monitor=HDMI-A-1,disable
monitor=,disable

# Workspaces persistentes 1-5 en DP-1
workspace=1,monitor:DP-1,persistent:true,default:true
workspace=2,monitor:DP-1,persistent:true
workspace=3,monitor:DP-1,persistent:true
workspace=4,monitor:DP-1,persistent:true
workspace=5,monitor:DP-1,persistent:true
workspace=6,monitor:DP-1
workspace=7,monitor:DP-1
workspace=8,monitor:DP-1
workspace=9,monitor:DP-1
workspace=10,monitor:DP-1
