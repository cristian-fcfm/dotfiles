################
### MONITORS ###
################

source = ~/.config/hypr/conf.d/monitors.conf

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = yazi
$browser = firefox
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = awww-daemon
exec-once = waybar & swaync & firefox
exec-once = [workspace 2 silent] kitty
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wlsunset -t 5200 -S 9:00 -s 19:30
exec-once = awww img ~/.wallpapers/berserk.png

#############################
### ENVIRONMENT VARIABLES ###
#############################

# tema de cursores
env = XCURSOR_THEME, Nordzy-cursors
env = XCURSOR_SIZE,24

###############
### GENERAL ###
###############

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(7e9cd8ff) rgba(957fb8ff) 45deg
    col.inactive_border = rgba(54546dff)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

#################
### DECORATION ##
#################

decoration {
  rounding = 5
  active_opacity = 1.0
  inactive_opacity = 0.85

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
  }

  shadow {
  	ignore_window = true
  	offset = 1 2
  	range = 10
  	render_power = 5
  	color = 0x6616161d
  }
}

#################
### ANIMATION ###
#################

animations {
  enabled = true

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1

  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = borderangle, 1, 30, liner, loop
  animation = fade, 1, 10, default
  animation = workspaces, 1, 5, wind
}

###############
### LAYOUTS ###
###############

dwindle {
    pseudotile = true 
    preserve_split = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us,latam
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
}

###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/conf.d/keybinds.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################


