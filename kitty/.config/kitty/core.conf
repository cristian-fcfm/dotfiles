# vim:fileencoding=utf-8:foldmethod=marker

# ========================================
# CURSOR
# ========================================
cursor_shape beam
cursor_shape_unfocused hollow
cursor_beam_thickness 1.5
cursor_blink_interval 0
cursor_stop_blinking_after 0
cursor_trail 0

# ========================================
# SCROLLBACK
# ========================================
# 50k lines for data science (large DataFrame prints, logs)
scrollback_lines 50000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
# 100MB pager history — enough for large training logs and pandas output
scrollback_pager_history_size 100
scrollback_fill_enlarged_window no
wheel_scroll_multiplier 3.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0

# ========================================
# MOUSE
# ========================================
mouse_hide_wait -1.0
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
show_hyperlink_targets yes
underline_hyperlinks hover

# copy_on_select is useful for grabbing data science output quickly
copy_on_select yes
clear_selection_on_clipboard_loss no
paste_actions quote-urls-at-prompt,confirm
strip_trailing_spaces smart

select_by_word_characters @-./_~?&=%+#
click_interval -1.0
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam

# ========================================
# PERFORMANCE & RENDERING
# ========================================
input_delay 3
repaint_delay 10
sync_to_monitor yes

# ========================================
# TRANSPARENCY
# ========================================
background_opacity 1.0
dynamic_background_opacity yes

# ========================================
# AUDIO & NOTIFICATIONS
# ========================================
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab " "

# ========================================
# ADVANCED
# ========================================
shell zsh
editor nvim
close_on_child_death no
update_check_interval 24
clipboard_max_size 512
allow_hyperlinks yes
shell_integration enabled
notify_on_cmd_finish never
forward_stdio no

# ========================================
# VIM-SLIME INTEGRATION
# ========================================
# Remote control required for vim-slime
allow_remote_control yes
listen_on unix:/tmp/mykitty
