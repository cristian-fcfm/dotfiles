# vim:fileencoding=utf-8:foldmethod=marker
# Kitty configuration — modular includes
# Edit the individual module files, not this one.

include theme.conf
include fonts.conf
include core.conf
include tabs.conf
include layouts.conf
include keybindings.conf

# Platform-specific overrides (font_size, emoji font, OS options).
# Stow deploys only the file for the current platform; globinclude loads whichever is present.
globinclude platform/*.conf
